name: Run DB Migrations (Prod)

on:
  push:
    branches:
      - main

jobs:
  migrate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'

      - name: Run Liquibase Migrations
        env:
          DB_HOST: ${{ secrets.PROD_DB_HOST }}
          DB_NAME: ${{ secrets.PROD_DB_NAME }}
          DB_USER: ${{ secrets.PROD_DB_USERNAME }}
          DB_PASS: ${{ secrets.PROD_DB_PASSWORD }}
        run: |
          DB_HOST=$(echo "$DB_HOST" | xargs)
          DB_NAME=$(echo "$DB_NAME" | xargs)
          DB_USER=$(echo "$DB_USER" | xargs)
          # TEMPORARY: Using changelogSync to register existing DB objects in Liquibase tracking table.
          # Switch back to liquibase:update after this runs once successfully.
          mvn liquibase:changelogSync \
            -Dliquibase.changeLogFile=dbchangelog.xml \
            -Dliquibase.url="jdbc:postgresql://${DB_HOST}:5432/${DB_NAME}?sslmode=require" \
            -Dliquibase.username="${DB_USER}" \
            -Dliquibase.password="${DB_PASS}" \
            -Dliquibase.driver=org.postgresql.Driver
